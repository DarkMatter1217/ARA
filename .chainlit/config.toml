[project]
# List of environment variables to be provided by each user to use the app.
user_env = []

# Duration (in seconds) during which the session is saved when the connection is lost
session_timeout = 3600

# Duration (in seconds) of the user session expiry (15 days)
user_session_timeout = 1296000

# Enable third parties caching (e.g., LangChain cache)
cache = false

# Whether to persist user environment variables (API keys) to the database
persist_user_env = false

# Whether to mask user environment variables (API keys) in the UI
mask_user_env = false

# Authorized origins
allow_origins = ["*"]

# =========================
# FEATURES (MERGED & FIXED)
# =========================
[features]
# Enable LaTeX rendering (Path A)
latex = true

# Security-related
unsafe_allow_html = false

# UI behavior
user_message_autoscroll = true
auto_tag_thread = true
edit_message = true
allow_thread_sharing = false

# =========================
# FEATURE EXTENSIONS
# =========================
[features.slack]
reaction_on_message_received = false

[features.spontaneous_file_upload]
enabled = true
accept = ["*/*"]
max_files = 20
max_size_mb = 500

[features.audio]
enabled = false
sample_rate = 24000

[features.mcp]
enabled = false

[features.mcp.sse]
enabled = true

[features.mcp.streamable-http]
enabled = true

[features.mcp.stdio]
enabled = true
allowed_executables = ["npx", "uvx"]

# =========================
# UI CONFIGURATION
# =========================
[UI]
name = "Assistant"
custom_css = "/public/chainlit.css"

# Chain-of-thought display mode
cot = "full"

alert_style = "classic"

# Optional UI customization (unused for now)
logo_file_url = ""
default_avatar_file_url = ""

# =========================
# META
# =========================
[meta]
generated_by = "2.9.3"
